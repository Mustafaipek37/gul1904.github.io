<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nisa | Doğum Günü Sürprizi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a0b2e 0%, #2e1a4a 50%, #1f0f38 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ========= ŞİFRE EKRANI ========= */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2e1a4a, #1a0b2e);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: all 0.6s ease;
        }

        .password-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 48px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-box h2 {
            color: #ffd966;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .password-box p {
            color: #c9b3ff;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .password-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 1.2rem;
            text-align: center;
            border: none;
            border-radius: 60px;
            background: white;
            outline: none;
            font-family: monospace;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .password-btn {
            background: linear-gradient(135deg, #9b7bcb, #b392e0);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .password-btn:active {
            transform: scale(0.95);
        }

        .error-msg {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }

        /* Hediye kutusu giriş ekranı */
        .gift-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2e1a4a, #1a0b2e);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            display: none;
        }

        .gift-box {
            text-align: center;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .gift-icon {
            font-size: 8rem;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3));
            transition: transform 0.3s;
            margin: 15px 0;
        }

        .gift-icon:active {
            transform: scale(0.95);
        }

        .gift-text {
            font-size: 1.8rem;
            color: #ffd966;
            margin-top: 10px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .gift-sub {
            color: #c9b3ff;
            margin-top: 10px;
            font-size: 1rem;
        }

        /* Ana içerik - başlangıçta gizli */
        .main-content {
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding: 20px;
            display: none;
        }

        .main-content.show {
            opacity: 1;
            transform: scale(1);
            display: block;
        }

        /* ========= KALP VE YILDIZ ARKA PLAN ========= */
        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-item {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.3;
            animation: floatAround 15s linear infinite;
            user-select: none;
        }

        @keyframes floatAround {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* Ana Konteyner */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            padding: 20px 24px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
        }

        /* Başlık */
        .title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
            color: #3c2a5f;
        }

        .sub {
            text-align: center;
            color: #7a63a3;
            margin-bottom: 15px;
            font-style: italic;
        }

        /* Zaman Sayacı */
        .timer-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .time-counter {
            background: linear-gradient(135deg, #9b7bcb, #b392e0);
            color: white;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-family: monospace;
            letter-spacing: 1px;
        }

        /* AYLAR GRİD */
        .months-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 14px;
            margin-bottom: 35px;
        }

        .month-btn {
            background: linear-gradient(135deg, #f5edff, #e9dfff);
            border: none;
            padding: 14px 8px;
            font-size: 1rem;
            font-weight: bold;
            color: #4a2e6e;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .month-btn:active {
            transform: scale(0.92);
        }

        .month-btn.active {
            background: linear-gradient(135deg, #9b7bcb, #b392e0);
            color: white;
            box-shadow: 0 8px 20px rgba(107, 70, 165, 0.5);
        }

        /* Resim Alanı - TAM KAPLAMA */
        .image-area {
            background: #fef9ff;
            border-radius: 36px;
            padding: 0;
            margin-bottom: 20px;
            text-align: center;
            min-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #f0e4ff;
            overflow: hidden;
        }

        .image-frame {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-frame img {
            width: 100%;
            height: auto;
            min-height: 320px;
            max-height: 500px;
            object-fit: cover;
            border-radius: 34px;
            display: block;
        }

        .placeholder-text {
            color: #b299da;
            font-size: 1.1rem;
            padding: 40px;
        }

        /* Sürpriz Mesaj Alanı */
        .surprise-message {
            background: #f4edff;
            border-radius: 24px;
            padding: 12px 20px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.95rem;
            color: #5a4090;
            border-left: 5px solid #b27eff;
        }

        /* Mektup İkonu */
        .letter-icon {
            background: linear-gradient(135deg, #f5edff, #e9dfff);
            border-radius: 60px;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin: 20px auto 0;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .letter-icon:active {
            transform: scale(0.9);
        }

        .letter-icon span {
            font-size: 2.5rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #fff9f0;
            border-radius: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 80%;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            animation: modalFadeIn 0.3s;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        @keyframes modalFadeIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #9b7bcb;
            transition: transform 0.2s;
        }

        .close-modal:hover {
            transform: scale(1.1);
        }

        .modal-content h2 {
            color: #8B4513;
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-body {
            font-size: 1rem;
            line-height: 1.8;
            color: #4a2e6e;
            white-space: pre-wrap;
            font-family: 'Georgia', serif;
        }

        .footer-note {
            text-align: center;
            margin-top: 25px;
            font-size: 0.8rem;
            color: #b29dd9;
        }

        /* TELEFON İÇİN ÖZEL */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            .container {
                padding: 16px;
            }
            .months-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
            .month-btn {
                padding: 12px 6px;
                font-size: 0.9rem;
            }
            .title {
                font-size: 1.5rem;
            }
            .gift-icon {
                font-size: 5rem;
            }
            .gift-text {
                font-size: 1.2rem;
            }
            .time-counter {
                font-size: 0.75rem;
                padding: 8px 12px;
            }
            .letter-icon {
                width: 55px;
                height: 55px;
            }
            .letter-icon span {
                font-size: 2rem;
            }
            .image-frame img {
                min-height: 280px;
                max-height: 400px;
            }
            .surprise-message {
                font-size: 0.85rem;
                padding: 10px 15px;
            }
            .password-box {
                padding: 30px 20px;
                margin: 20px;
            }
            .password-box h2 {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 380px) {
            .months-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .image-frame img {
                min-height: 250px;
                max-height: 350px;
            }
        }

        @media (min-width: 768px) {
            .month-btn {
                font-size: 1.1rem;
                padding: 16px 8px;
            }
            .image-frame img {
                min-height: 400px;
                max-height: 500px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
</head>
<body>

<!-- ŞİFRE EKRANI -->
<div class="password-overlay" id="passwordOverlay">
    <div class="password-box">
        <h2>🔐</h2>
        <input type="password" class="password-input" id="passwordInput" placeholder="?🤷?" autocomplete="off">
        <button class="password-btn" id="passwordBtn">🤎🤍</button>
        <div class="error-msg" id="errorMsg">❌</div>
    </div>
</div>

<!-- HEDİYE KUTUSU GİRİŞ EKRANI -->
<div class="gift-overlay" id="giftOverlay">
    <div class="gift-box" id="giftBox">
        <div class="gift-icon">💙</div>
        <div class="gift-text">🤎</div>
        <div class="gift-sub">🤍</div>
    </div>
</div>

<!-- ANA İÇERİK (BAŞLANGIÇTA GİZLİ) -->
<div class="main-content" id="mainContent">
    <div class="floating-bg" id="floatingBg"></div>
    
    <div class="container">
        <h1 class="title">🤎𝑯𝒆𝒓𝒔̧𝒆𝒚𝒊𝒎𝒎𝒎🤎</h1>
        <div class="sub">🌟𝗚𝘂̈𝗻𝗲𝘀̧ 𝗛𝗲𝗿𝗴𝘂̈𝗻 𝗗𝗼𝗴̆𝗮𝗿 𝗕𝗶𝘁𝗮𝗻𝗲𝗺𝗺𝗺 𝗜̇𝘆𝗶 𝗸𝗶 𝗗𝗼𝗴̆𝗱𝘂𝗻𝗻𝗻🌟</div>

        <div class="timer-container">
            <div class="time-counter" id="timeCounter">📅 Hesaplanıyor...</div>
        </div>

        <div class="months-grid" id="monthsGrid"></div>

        <div class="surprise-message" id="surpriseMessage">
            💖 Bir aya dokun, o aya dair özel bir not göreceksin 💖
        </div>

        <div class="image-area" id="imageArea">
            <div class="placeholder-text">
                ✨ Bir aya dokun, o aya ait özel fotoğraf gelsin ✨
            </div>
        </div>

        <div class="letter-icon" id="letterIcon">
            <span>📜</span>
        </div>

        <div class="footer-note">
            ❤️ 𝑰̇𝒚𝒊 𝒌𝒊𝒊𝒊 𝑫𝒐𝒈𝒅𝒖𝒏𝒏𝒏 𝑯𝒂𝒚𝒂𝒕ı𝒎𝒎𝒎ı𝒏 𝑨𝒏𝒍𝒂𝒎ıııı❤️
        </div>
    </div>
</div>

<!-- MEKTUP MODAL -->
<div class="modal" id="letterModal">
    <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <h2>❤️𝑰̇𝒚𝒊 𝒌𝒊𝒊𝒊 𝑫𝒐𝒈𝒅𝒖𝒏𝒏𝒏 𝑯𝒂𝒚𝒂𝒕ı𝒎𝒎𝒎❤️</h2>
        <div class="modal-body" id="letterContent">
        </div>
    </div>
</div>

<script>
    // ŞİFRE KONTROLÜ
    const SIFRE = "19.04.2009.04.07.2008";
    
    function checkPassword() {
        const input = document.getElementById('passwordInput').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        
        if (input === SIFRE) {
            // Şifre doğru, şifre ekranını kaldır, hediye kutusunu göster
            document.getElementById('passwordOverlay').style.display = 'none';
            document.getElementById('giftOverlay').style.display = 'flex';
        } else {
            errorMsg.style.display = 'block';
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
        }
    }
    
    // Enter tuşuna basınca da çalışsın
    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            checkPassword();
        }
    });
    
    document.getElementById('passwordBtn').addEventListener('click', checkPassword);
    
    // ZAMAN SAYACI
    function updateTimeCounter() {
        const startDate = new Date(2025, 7, 6, 0, 0, 0);
        const now = new Date();
        
        let diff = now - startDate;
        
        if (diff < 0) {
            document.getElementById('timeCounter').innerHTML = '💖 Henüz başlamadı 💖';
            return;
        }
        
        const totalSeconds = Math.floor(diff / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        
        const timeString = `📅 ${days} Gün ${hours} saat ${minutes} dakika ${seconds} saniye 💖`;
        
        const counterEl = document.getElementById('timeCounter');
        if (counterEl) {
            counterEl.innerHTML = timeString;
        }
    }

    // Konfeti
    function burstConfetti() {
        canvasConfetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#ff6b6b', '#4ecdc4', '#ffe66d', '#ff9f4a', '#b27eff']
        });
    }

    function megaConfetti() {
        canvasConfetti({
            particleCount: 250,
            spread: 100,
            origin: { y: 0.5 },
            startVelocity: 20,
            colors: ['#ffd700', '#ff6b6b', '#ff85b3', '#9b7bcb', '#4ecdc4']
        });
        setTimeout(() => {
            canvasConfetti({
                particleCount: 150,
                spread: 120,
                origin: { y: 0.3 }
            });
        }, 150);
    }

    // Kalp patlaması
    function createHeartBurst(x, y) {
        const hearts = ['❤️', '🧡', '🤎', '💙', '💕', '💜', '🤍'];
        for (let i = 0; i < 20; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.position = 'fixed';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            heart.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = '9999';
            heart.style.transition = 'all 0.8s ease-out';
            heart.style.opacity = '0.8';
            
            const angle = Math.random() * Math.PI * 2;
            const distance = 40 + Math.random() * 120;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance - 40;
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.style.transform = `translate(${tx}px, ${ty}px) rotate(${Math.random() * 360}deg)`;
                heart.style.opacity = '0';
            }, 10);
            
            setTimeout(() => heart.remove(), 800);
        }
    }

    // Aylar
    const months = ["AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK", "OCAK", "ŞUBAT", "MART", "NİSAN"];

    const monthImages = {
        "AĞUSTOS": "1.jpeg",
        "EYLÜL": "2.jpeg",
        "EKİM": "3.jpeg",
        "KASIM": "4.jpeg",
        "ARALIK": "5.jpeg",
        "OCAK": "6.jpeg",
        "ŞUBAT": "7.jpeg",
        "MART": "9.jpeg",
        "NİSAN": "8.jpeg"
    };

    const monthMessages = {
        "AĞUSTOS": "𝑰̇𝒚𝒊 𝒌𝒊𝒊𝒊𝒊 𝑫𝒐𝒈̆𝒅𝒖𝒏𝒏𝒏𝒏 𝑷𝒓𝒆𝒏𝒔𝒆𝒔𝒊𝒎𝒎𝒎𝒎",
        "EYLÜL": "𝑰̇𝒚𝒊 𝒌𝒊𝒊𝒊𝒊 𝑫𝒐𝒈̆𝒅𝒖𝒏𝒏𝒏𝒏 𝑮𝒖̈𝒛𝒆𝒍𝒊𝒎𝒎𝒎𝒎",
        "EKİM": "𝑰̇𝒚𝒊 𝒌𝒊𝒊𝒊𝒊 𝑫𝒐𝒈̆𝒅𝒖𝒏𝒏𝒏𝒏 𝑩𝒂𝒍ı𝒎𝒎𝒎𝒎",
        "KASIM": "𝑰̇𝒚𝒊 𝒌𝒊𝒊𝒊𝒊 𝑫𝒐𝒈̆𝒅𝒖𝒏𝒏𝒏𝒏 𝑺𝒆𝒗𝒈𝒊𝒍𝒊𝒎𝒎𝒎𝒎",
        "ARALIK": "𝑰̇𝒚𝒊 𝒌𝒊𝒊𝒊𝒊 𝑫𝒐𝒈̆𝒅𝒖𝒏𝒏𝒏𝒏 𝑩𝑰̇𝒕𝒂𝒏𝒆𝒎𝒎𝒎𝒎",
        "OCAK": "𝑰̇𝒚𝒊 𝒌𝒊𝒊𝒊𝒊 𝑫𝒐𝒈̆𝒅𝒖𝒏𝒏𝒏𝒏 𝑯𝒆𝒓𝒔𝒆𝒚𝒊𝒎𝒎𝒎𝒎",
        "ŞUBAT": "𝑰̇𝒚𝒊 𝒌𝒊𝒊𝒊𝒊 𝑫𝒐𝒈̆𝒅𝒖𝒏𝒏𝒏𝒏 𝑺𝒖𝒍𝒕𝒂𝒏ı𝒎𝒎𝒎𝒎",
        "MART": "𝑰̇𝒚𝒊 𝒌𝒊𝒊𝒊𝒊 𝑫𝒐𝒈̆𝒅𝒖𝒏𝒏𝒏𝒏 𝑩𝒆𝒃𝒆𝒈𝒊𝒎𝒎𝒎𝒎",
        "NİSAN": "𝑰̇𝒚𝒊 𝒌𝒊𝒊𝒊𝒊 𝑫𝒐𝒈̆𝒅𝒖𝒏𝒏𝒏𝒏 𝑯𝒂𝒚𝒂𝒕ı𝒎𝒎𝒎𝒎"
    };

    function updateImage(month) {
        const imageArea = document.getElementById('imageArea');
        const imageUrl = monthImages[month];
        
        if (imageUrl) {
            imageArea.innerHTML = `<div class="image-frame"><img src="${imageUrl}" alt="${month} ayı anısı" loading="lazy"></div>`;
        } else {
            imageArea.innerHTML = `<div class="placeholder-text">📸 Bu aya ait özel fotoğraf hazırlanıyor...</div>`;
        }
    }

    function updateSurpriseMessage(month) {
        const messageDiv = document.getElementById('surpriseMessage');
        const message = monthMessages[month] || "💫𝑰̇𝒚𝒊 𝒌𝒊𝒊𝒊𝒊 𝑫𝒐𝒈̆𝒅𝒖𝒏𝒏𝒏𝒏 𝑵𝒆𝒇𝒆𝒔𝒊𝒎𝒎𝒎𝒎💫";
        messageDiv.innerHTML = `💖 ${message} 💖`;
    }

    function createMonthButtons() {
        const grid = document.getElementById('monthsGrid');
        grid.innerHTML = '';
        
        months.forEach(month => {
            const btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.textContent = month;
            
            btn.addEventListener('click', () => {
                document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateImage(month);
                updateSurpriseMessage(month);
                burstConfetti();
                if (navigator.vibrate) navigator.vibrate(50);
            });
            
            grid.appendChild(btn);
        });
        
        if (months.length > 0) {
            const firstBtn = grid.children[0];
            firstBtn.classList.add('active');
            updateImage(months[0]);
            updateSurpriseMessage(months[0]);
        }
    }

    // Arka plan
    function createFloatingElements() {
        const bgContainer = document.getElementById('floatingBg');
        const icons = ['❤️', '💖', '💗', '✨', '⭐', '🌟', '💫', '💕', '💓', '🎈'];
        
        for (let i = 0; i < 40; i++) {
            const element = document.createElement('div');
            element.className = 'floating-item';
            const randomIcon = icons[Math.floor(Math.random() * icons.length)];
            element.textContent = randomIcon;
            
            const size = 0.8 + Math.random() * 1.7;
            element.style.fontSize = `${size}rem`;
            element.style.left = `${Math.random() * 100}%`;
            const duration = 10 + Math.random() * 20;
            element.style.animationDuration = `${duration}s`;
            element.style.animationDelay = `${Math.random() * 15}s`;
            element.style.opacity = 0.2 + Math.random() * 0.3;
            
            bgContainer.appendChild(element);
        }
    }

    // Hediye kutusunu aç
    function openGift() {
        const overlay = document.getElementById('giftOverlay');
        const mainContent = document.getElementById('mainContent');
        
        overlay.style.opacity = '0';
        overlay.style.transform = 'scale(0.8)';
        setTimeout(() => {
            overlay.style.display = 'none';
            mainContent.classList.add('show');
            megaConfetti();
        }, 500);
    }

    // MEKTUP İÇERİĞİ
    const mektupIcerigi = ` Yavrummmm 
𝙉efesimm
𝙄yikimmm
𝙎enle öğrendim herşeyiii 
𝗔şkımmmm bitanemmm
 İyikiii varsınnnnn iyiiiiiiiiiiii doğdunnn birtanemmm çokkk seviyorumm senii kelimelerle anlatılmayacak kadar çok herşeyim oldun güzelimmmm iyikii varsınn iyikii doğdunnn prensesimmm
 Her zaman ne olursa olsun her şekilde hep yanında dağ gibi olucamm yavrummmm hiç şüphennn olmasınnn sevgilimm iyikiiii varsınnn yaşama sebebimmmmm.
prensesimmm kokuna müptela olduğummm dünyalar güzelimm kahverengi gözlerine mis gibi kokulu saçlarına ellerine gülüşüneee hasta olduğummm tek bir saç teline kurbannn olduğummm iyikii varsınn sevgilimm
 cokkkkkkkkk seviyorummm seniii güzelimmmm herşeyden herkesden çokkkk seviyorummm seniii bebeğimmm iyiiiiiiiiiiii varsınnnnn yavrummmm iyiki tanismisizzzzz çokkkk seviyorummm seniii.🤍🤎`;

    // Mektup modal
    function setupLetterModal() {
        const modal = document.getElementById('letterModal');
        const letterIcon = document.getElementById('letterIcon');
        const closeBtn = document.getElementById('closeModal');
        const letterContent = document.getElementById('letterContent');
        
        letterContent.innerHTML = mektupIcerigi.replace(/\n/g, '<br>');
        
        letterIcon.addEventListener('click', () => {
            modal.style.display = 'flex';
            burstConfetti();
        });
        
        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });
    }

    // Ekrana tıklayınca kalp patlaması
    document.body.addEventListener('click', function(e) {
        const mainContent = document.getElementById('mainContent');
        if (mainContent.classList.contains('show')) {
            const modal = document.getElementById('letterModal');
            if (modal.style.display !== 'flex') {
                createHeartBurst(e.clientX, e.clientY);
            }
        }
    });

    // SAYFA YÜKLENİR YÜKLENMEZ SAYACI BAŞLAT
    updateTimeCounter();
    setInterval(updateTimeCounter, 1000);

    // Sayfa yükleme
    document.getElementById('giftBox').addEventListener('click', openGift);
    createMonthButtons();
    createFloatingElements();
    setupLetterModal();
</script>
</body>
</html>
